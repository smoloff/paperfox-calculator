<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Брошур</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-wrapper">
        <div class="form-group">
            <label>Розмір готового виробу, мм</label>
            <div class="flex-row">
                <input type="number" id="calc-width" placeholder="ширина, мм" min="10" value="210">
                <span class="separator">X</span>
                <input type="number" id="calc-height" placeholder="висота, мм" min="10" value="297">
            </div>
        </div>

        <div class="form-group">
            <label>Спосіб скріплення</label>
            <select id="binding-type">
                <option value="spring-plastic">На пластикову пружину</option>
                <option value="spring-metal">На металеву пружину</option>
                <option value="staple">На скобу</option>
                <option value="glue">Термобіндер (клей)</option>
            </select>
        </div>

        <div class="form-group" id="block-standard-cover" style="display: none;">
            <label>Обкладинка</label>
            <select id="standard-cover-material"></select>
            <select id="standard-cover-print">
                <option value="4+4">Друк 4+4</option>
                <option value="4+0">Друк 4+0</option>
                <option value="1+1">Друк 1+1</option>
                <option value="1+0">Друк 1+0</option>
            </select>
            <select id="standard-cover-lamination"></select>
        </div>

        <div class="form-group" id="block-spring-options">
            <label>Опції для пружини</label>
            <select id="spring-base-set">
                <option value="plastic-white">Прозорий пластик + Біла підкладка</option>
                <option value="plastic-plastic">Прозора обкладинка + Прозора підкладка</option>
                <option value="none">Без комплекту</option>
            </select>
            
            <div style="margin-top: 10px;">
                <label><input type="checkbox" id="spring-has-custom-cover"> Кастомна обкладинка (друк)</label>
                <div id="spring-custom-cover-options" style="display: none; margin-top: 5px;">
                    <select id="spring-custom-cover-material"></select>
                    <select id="spring-custom-cover-print">
                        <option value="4+4">Друк 4+4</option>
                        <option value="4+0">Друк 4+0</option>
                        <option value="1+1">Друк 1+1</option>
                        <option value="1+0">Друк 1+0</option>
                    </select>
                    <select id="spring-custom-cover-lamination"></select>
                </div>
            </div>

            <div style="margin-top: 10px;">
                <label><input type="checkbox" id="spring-has-custom-backing"> Кастомна підкладка (друк)</label>
                <div id="spring-custom-backing-options" style="display: none; margin-top: 5px;">
                    <select id="spring-custom-backing-material"></select>
                    <select id="spring-custom-backing-print">
                        <option value="4+4">Друк 4+4</option>
                        <option value="4+0">Друк 4+0</option>
                        <option value="1+1">Друк 1+1</option>
                        <option value="1+0">Друк 1+0</option>
                    </select>
                    <select id="spring-custom-backing-lamination"></select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Наповнення</label>
            <select id="inner-material"></select>
            <select id="inner-print-type">
                <option value="4+4">Друк 4+4 (Колір)</option>
                <option value="4+0">Друк 4+0 (Колір)</option>
                <option value="1+1">Друк 1+1 (Ч/Б)</option>
                <option value="1+0">Друк 1+0 (Ч/Б)</option>
            </select>
            <input type="number" id="inner-pages" placeholder="сторінок, шт" min="1" value="10">
            <small class="hint" id="inner-pages-hint">Кількість сторінок має бути парною</small>
        </div>

        <div class="form-group">
            <label>Кількість екземплярів</label>
            <div id="quantity-container">
                <div class="quantity-row">
                    <input type="number" class="calc-quantity" placeholder="шт" min="1" value="1">
                </div>
            </div>
            <button type="button" id="add-proposal-btn">+ Комерційна пропозиція</button>
        </div>

        <div id="calc-result" class="result-box">
            Завантаження даних з бази...
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
